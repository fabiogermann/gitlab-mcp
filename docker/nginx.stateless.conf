# Round-robin load balancer in front of gitlab-mcp-a and gitlab-mcp-b.
#
# Every request is routed to the next backend, which is exactly what we
# want for testing stateless-mode: consecutive requests of the same
# logical MCP session deterministically hit different pods.
#
# Header passthrough is intentional — the MCP client sends Mcp-Session-Id
# and Private-Token, and the backends need to receive them unchanged.

upstream gitlab_mcp_pool {
    # No session affinity. Plain round-robin.
    server gitlab-mcp-a:3002;
    server gitlab-mcp-b:3002;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # MCP Streamable HTTP can use SSE streams for responses, so disable
    # response buffering and extend timeouts.
    proxy_http_version 1.1;
    proxy_buffering off;
    proxy_read_timeout 3600;
    proxy_send_timeout 3600;

    # Preserve every header a client might send. By default nginx drops
    # underscored headers, which would nuke any X-Gitlab-Api-Url style
    # override, so we turn that off too.
    underscores_in_headers on;

    location / {
        proxy_pass http://gitlab_mcp_pool;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # Convenience: expose which upstream served a given request so tests
    # can observe the round-robin behaviour.
    add_header X-Upstream $upstream_addr always;
}
