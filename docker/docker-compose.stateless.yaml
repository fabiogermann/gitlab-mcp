---
# Multi-pod stateless-mode test bench.
#
# Mirrors the production flow used at
# source/repos/do/gitlab/gitlab-mcp (Kubernetes via the sp-microservice
# module, Traefik in front, GitLab MCP OAuth with callback-proxy against
# a self-hosted GitLab instance) — but trades Traefik cookie stickiness
# for **no affinity at all**, which is what stateless mode makes safe.
#
# Two identical gitlab-mcp containers share OAUTH_STATELESS_SECRET and
# sit behind an nginx round-robin load balancer. Consecutive requests
# of one MCP session deterministically land on different containers,
# reproducing the worst-case routing scenario that breaks today's
# in-memory caches and which stateless mode makes transparent.
#
# Quick start:
#   cd docker
#   cp .env.stateless.example .env.stateless
#   # edit .env.stateless — at minimum set:
#   #   OAUTH_STATELESS_SECRET (openssl rand -base64 32)
#   #   GITLAB_API_URL         (e.g. https://gitserver.warrantymaster.com/api/v4)
#   #   MCP_SERVER_URL         (public URL of the MCP endpoint)
#   #   GITLAB_OAUTH_APP_ID    (pre-registered GitLab OAuth app client_id)
#   docker compose -f docker-compose.stateless.yaml --env-file .env.stateless up
#
# Load-balanced MCP endpoint:  http://127.0.0.1:3000/mcp
# Pod A metrics (direct):       http://127.0.0.1:3011/metrics
# Pod B metrics (direct):       http://127.0.0.1:3012/metrics

services:
  gitlab-mcp-a:
    image: ${GITLAB_MCP_IMAGE:-ghcr.io/fabiogermann/gitlab-mcp:latest}
    container_name: gitlab-mcp-a
    restart: unless-stopped
    ports:
      # Expose per-pod port for direct inspection (metrics, logs).
      # The load balancer on port 3000 is what normal callers should use.
      - "3011:3002"
    environment:
      HOST: 0.0.0.0
      PORT: "3002"
      STREAMABLE_HTTP: "true"

      # --- Match the production flow ---------------------------------
      # GitLab MCP OAuth proxy mode with callback-proxy enabled: only
      # ONE GitLab OAuth application redirect URI has to be registered
      # (MCP_SERVER_URL/callback), regardless of how many MCP clients
      # connect.
      GITLAB_MCP_OAUTH: "true"
      GITLAB_OAUTH_CALLBACK_PROXY: "true"
      GITLAB_API_URL: ${GITLAB_API_URL}
      MCP_SERVER_URL: ${MCP_SERVER_URL}
      GITLAB_OAUTH_APP_ID: ${GITLAB_OAUTH_APP_ID}
      # Optional scope override; defaults to "api" (rw) / "read_api" (ro).
      GITLAB_OAUTH_SCOPES: ${GITLAB_OAUTH_SCOPES:-}
      # Allow plain-HTTP MCP_SERVER_URL when smoke-testing against localhost.
      MCP_DANGEROUSLY_ALLOW_INSECURE_ISSUER_URL: ${MCP_DANGEROUSLY_ALLOW_INSECURE_ISSUER_URL:-false}

      GITLAB_READ_ONLY_MODE: ${GITLAB_READ_ONLY_MODE:-true}

      # --- Stateless mode (the point of this compose file) ------------
      # With both pods sharing OAUTH_STATELESS_SECRET:
      #   - signed client_id carries the DCR registration
      #   - sealed OAuth state carries the /authorize → /callback hop
      #   - sealed proxy code carries the /callback → /token hop
      #   - sealed Mcp-Session-Id carries the /mcp session auth
      # No in-memory caches, no sticky sessions, no shared store.
      OAUTH_STATELESS_MODE: "true"
      OAUTH_STATELESS_SECRET: ${OAUTH_STATELESS_SECRET}
      # Optional rotation slot; leave empty normally.
      OAUTH_STATELESS_SECRET_PREVIOUS: ${OAUTH_STATELESS_SECRET_PREVIOUS:-}

      LOG_LEVEL: ${LOG_LEVEL:-info}
    networks:
      - statelessnet

  gitlab-mcp-b:
    image: ${GITLAB_MCP_IMAGE:-ghcr.io/fabiogermann/gitlab-mcp:latest}
    container_name: gitlab-mcp-b
    restart: unless-stopped
    ports:
      - "3012:3002"
    environment:
      HOST: 0.0.0.0
      PORT: "3002"
      STREAMABLE_HTTP: "true"

      GITLAB_MCP_OAUTH: "true"
      GITLAB_OAUTH_CALLBACK_PROXY: "true"
      GITLAB_API_URL: ${GITLAB_API_URL}
      MCP_SERVER_URL: ${MCP_SERVER_URL}
      GITLAB_OAUTH_APP_ID: ${GITLAB_OAUTH_APP_ID}
      GITLAB_OAUTH_SCOPES: ${GITLAB_OAUTH_SCOPES:-}
      MCP_DANGEROUSLY_ALLOW_INSECURE_ISSUER_URL: ${MCP_DANGEROUSLY_ALLOW_INSECURE_ISSUER_URL:-false}

      GITLAB_READ_ONLY_MODE: ${GITLAB_READ_ONLY_MODE:-true}

      OAUTH_STATELESS_MODE: "true"
      # IMPORTANT: same secret as pod-a
      OAUTH_STATELESS_SECRET: ${OAUTH_STATELESS_SECRET}
      OAUTH_STATELESS_SECRET_PREVIOUS: ${OAUTH_STATELESS_SECRET_PREVIOUS:-}

      LOG_LEVEL: ${LOG_LEVEL:-info}
    networks:
      - statelessnet

  # Round-robin load balancer. Every request is dispatched to the next
  # backend, so no request pair goes to the same pod — this is the worst
  # case for session-bound in-memory state and the best case for proving
  # that stateless mode works.
  #
  # In the production deployment this role is filled by Traefik with
  # cookie stickiness (see deploy.tf::ingressroute.sticky). With
  # stateless mode enabled, the stickiness becomes optional — that's
  # what this compose demonstrates.
  lb:
    image: nginx:1.27-alpine
    container_name: gitlab-mcp-lb
    ports:
      - "3000:80"
    volumes:
      - ./nginx.stateless.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - gitlab-mcp-a
      - gitlab-mcp-b
    networks:
      - statelessnet

networks:
  statelessnet:
    driver: bridge
