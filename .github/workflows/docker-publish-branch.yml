name: Docker Publish (branch)

# Publishes a Docker image to GHCR for every push on a feature or hotfix
# branch. This makes it trivial to point a deployment (e.g. the
# docker-compose.stateless.yaml test bench) at the in-flight branch
# without waiting for a release.
#
# Images are tagged with:
#   - the sanitized branch name (e.g. feat-oauth-accept-existing-client-id)
#   - the short commit SHA
#   - `sha-<full-sha>` (metadata-action default)
#
# The registry is GHCR under the repository owner so the build only
# requires the workflow-scoped GITHUB_TOKEN; no Docker Hub credentials
# are needed for branch builds.

on:
  push:
    branches:
      - 'feat/**'
      - 'hotfix/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/gitlab-mcp
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=sha,format=long,prefix=sha-

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
