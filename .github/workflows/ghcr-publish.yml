name: GHCR Publish

# Builds the gitlab-mcp Docker image on every push and publishes it to
# GitHub Container Registry (ghcr.io/<owner>/gitlab-mcp).
#
# Tags applied to each image:
#   - <commit-sha>        (full 40-char SHA — primary, immutable)
#   - <short-sha>         (7-char SHA — convenience)
#   - <branch-name>       (on branch pushes; slashes are replaced with -)
#   - latest              (only on pushes to main)
#
# Authentication uses the auto-provisioned GITHUB_TOKEN; no secrets to
# configure in repo settings.

on:
  push:
    branches:
      - "**"
  workflow_dispatch: {}

concurrency:
  # Cancel in-progress builds for the same ref when a new push arrives —
  # the older image would be superseded anyway.
  group: ghcr-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image reference
        id: image
        run: |
          # Lowercase the owner since ghcr requires lowercase image paths.
          owner="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "image=ghcr.io/${owner}/gitlab-mcp" >> "$GITHUB_OUTPUT"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.image }}
          tags: |
            type=sha,format=long
            type=sha,format=short
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
